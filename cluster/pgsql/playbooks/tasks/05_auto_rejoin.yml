- name: Install pg-auto-rejoin script
  ansible.builtin.copy:
    dest: /usr/local/bin/pg-auto-rejoin.sh
    mode: "0755"
    content: |
      #!/bin/bash
      set -u

      LOG="/var/log/repmgr/auto-rejoin.log"
      REPMGR_CONF="{{ repmgr_conf_path }}"
      REPMGR_PASS="{{ repmgr_password }}"
      SERVICE_NAME="{{ postgresql_service_name }}"
      NODE_DELAY={{ erawan_pg_node_delay }}
      LOCKFILE="/tmp/pg-auto-rejoin.lock"
      OTHER_NODES=({% for ip in erawan_pg_other_node_ips %}"{{ ip }}" {% endfor %})

      mkdir -p /var/log/repmgr
      touch "$LOG"

      if [ -f "$LOCKFILE" ]; then
        echo "[$(date)] Already ran this boot - skipping." >> "$LOG"
        exit 0
      fi
      touch "$LOCKFILE"

      echo "[$(date)] Auto-rejoin started on {{ ansible_host }} (delay=${NODE_DELAY}s)..." >> "$LOG"
      sleep "$NODE_DELAY"
      pkill repmgrd 2>/dev/null || true
      sleep 2

      PRIMARY_IP=""
      for NODE_IP in "${OTHER_NODES[@]}"; do
        RESULT=$(sudo -u postgres psql \
          "host=${NODE_IP} user={{ repmgr_user }} dbname={{ repmgr_db }} password=${REPMGR_PASS} connect_timeout=3" \
          -tAc "SELECT pg_is_in_recovery();" 2>/dev/null | tr -d '[:space:]')
        if [ "$RESULT" = "f" ]; then
          PRIMARY_IP="$NODE_IP"
          echo "[$(date)] Found primary at ${PRIMARY_IP}" >> "$LOG"
          break
        fi
      done

      if [ -z "$PRIMARY_IP" ]; then
        LOCAL_STATE=$(sudo -u postgres psql -d postgres -tAc "SELECT pg_is_in_recovery();" 2>/dev/null | tr -d '[:space:]')
        systemctl start "$SERVICE_NAME" >> "$LOG" 2>&1 || true
        if [ "$LOCAL_STATE" = "t" ]; then
          echo "[$(date)] No other primary found - promoting local standby..." >> "$LOG"
          sudo -u postgres repmgr -f "$REPMGR_CONF" standby promote >> "$LOG" 2>&1 || true
          sleep 5
        fi
        echo "[$(date)] Registering local node as primary..." >> "$LOG"
        sudo -u postgres repmgr -f "$REPMGR_CONF" primary register --force >> "$LOG" 2>&1
        systemctl start repmgrd >> "$LOG" 2>&1 || true
        echo "[$(date)] Done - running as primary." >> "$LOG"
        exit 0
      fi

      echo "[$(date)] Rejoining as standby to ${PRIMARY_IP}..." >> "$LOG"
      systemctl stop "$SERVICE_NAME" >> "$LOG" 2>&1 || true
      sleep 3

      sudo -u postgres repmgr -f "$REPMGR_CONF" node rejoin \
        -d "host=${PRIMARY_IP} user={{ repmgr_user }} dbname={{ repmgr_db }} password=${REPMGR_PASS} connect_timeout=3" \
        --force-rewind >> "$LOG" 2>&1

      if [ $? -eq 0 ]; then
        echo "[$(date)] Rejoin successful - updating metadata..." >> "$LOG"
        sudo -u postgres repmgr -f "$REPMGR_CONF" standby register --force >> "$LOG" 2>&1
        systemctl start "$SERVICE_NAME" >> "$LOG" 2>&1
        sleep 5
        systemctl start repmgrd >> "$LOG" 2>&1
        echo "[$(date)] Done - running as standby." >> "$LOG"
      else
        echo "[$(date)] Rejoin failed - starting PostgreSQL only." >> "$LOG"
        systemctl start "$SERVICE_NAME" >> "$LOG" 2>&1 || true
      fi
  tags: ["auto_rejoin"]

- name: Install pg-auto-rejoin systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/pg-auto-rejoin.service
    mode: "0644"
    content: |
      [Unit]
      Description=PostgreSQL Auto Rejoin after recovery
      After=network.target {{ postgresql_service_name }}.service
      Wants={{ postgresql_service_name }}.service

      [Service]
      Type=oneshot
      ExecStart=/usr/local/bin/pg-auto-rejoin.sh
      RemainAfterExit=no

      [Install]
      WantedBy=multi-user.target
  register: pgsql_auto_rejoin_unit
  tags: ["auto_rejoin"]

- name: Reload systemd after pg-auto-rejoin unit changes
  ansible.builtin.systemd:
    daemon_reload: true
  when: pgsql_auto_rejoin_unit.changed
  tags: ["auto_rejoin"]

- name: Enable pg-auto-rejoin service
  ansible.builtin.systemd:
    name: pg-auto-rejoin.service
    enabled: true
  tags: ["auto_rejoin"]
