---
- name: Rollback mysqlrouter services
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Stop mysqlrouter service if present
      ansible.builtin.systemd:
        name: "{{ router_service_name }}"
        state: stopped
      ignore_errors: true
      tags: ["rollback"]

    - name: Disable mysqlrouter service if present
      ansible.builtin.systemd:
        name: "{{ router_service_name }}"
        enabled: false
      ignore_errors: true
      tags: ["rollback"]

    - name: Remove mysqlrouter systemd service file
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ router_service_name }}.service"
        state: absent
      tags: ["rollback"]

    - name: Remove mysqlrouter directory
      ansible.builtin.file:
        path: "/etc/mysqlrouter/{{ cluster_name }}"
        state: absent
      tags: ["rollback"]

- name: Dissolve cluster from primary
  hosts: mysql_primary
  gather_facts: false
  become: true
  tasks:
    - name: Dissolve InnoDB cluster if exists
      ansible.builtin.shell: |
        set -euo pipefail
        cat >/tmp/rollback_cluster.py <<'PY'
        import os

        shell.options["useWizards"] = False
        cluster_name = {{ cluster_name | to_json }}

        last_error = None
        for socket_path in ("/var/run/mysqld/mysqld.sock", "/run/mysqld/mysqld.sock", "/var/lib/mysql/mysql.sock"):
          if not os.path.exists(socket_path):
            continue
          try:
            shell.connect({
              "user": "root",
              "scheme": "mysql",
              "host": "localhost",
              "socket": socket_path
            })
            break
          except Exception as exc:
            last_error = exc
        else:
          if last_error is not None:
            raise last_error
          raise RuntimeError("unable to find a usable MySQL local socket for root")

        try:
          cluster = dba.get_cluster(cluster_name)
          cluster.dissolve({"force": True})
          print("cluster dissolved")
        except Exception as e:
          message = str(e).lower()
          if "does not exist" in message or "unknown cluster" in message or "standalone instance" in message:
            print("cluster already absent")
          else:
            raise
        PY
        timeout {{ mysqlsh_rollback_timeout_seconds | default(180) | int }} \
          mysqlsh --no-wizard --py --file /tmp/rollback_cluster.py
        rm -f /tmp/rollback_cluster.py
      args:
        executable: /bin/bash
      register: rollback_cluster
      changed_when: "'cluster dissolved' in rollback_cluster.stdout"
      tags: ["rollback"]
