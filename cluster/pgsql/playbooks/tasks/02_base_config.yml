- name: Rediscover PostgreSQL runtime facts for this step
  ansible.builtin.import_tasks: runtime_facts.yml
  tags: ["base_config"]

- name: Stop services before reconfiguration
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: stopped
  loop:
    - patroni
    - etcd
    - "{{ erawan_pg_service_name }}"
  failed_when: false
  tags: ["base_config"]

- name: Disable versioned PostgreSQL service before Patroni takeover
  ansible.builtin.systemd:
    name: "{{ erawan_pg_service_name }}"
    enabled: false
  failed_when: false
  tags: ["base_config"]

- name: Mask wrapper PostgreSQL service
  ansible.builtin.systemd:
    name: postgresql.service
    masked: true
  failed_when: false
  tags: ["base_config"]

- name: Ensure configuration and runtime directories exist
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "/etc/etcd", owner: "root", group: "root", mode: "0755" }
    - { path: "/etc/patroni", owner: "postgres", group: "postgres", mode: "0755" }
    - { path: "/var/run/postgresql", owner: "postgres", group: "postgres", mode: "2775" }
  tags: ["base_config"]

- name: Ensure Patroni pgpass file exists
  ansible.builtin.file:
    path: "{{ patroni_pgpass_path }}"
    state: touch
    owner: postgres
    group: postgres
    mode: "0600"
  tags: ["base_config"]

- name: Install etcd configuration
  ansible.builtin.copy:
    dest: "{{ etcd_config_path }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      name: {{ ('etcd' ~ erawan_pg_node_id) | to_json }}
      data-dir: /var/lib/etcd
      listen-client-urls: {{ ('http://' ~ ansible_host ~ ':' ~ (etcd_client_port | string) ~ ',http://127.0.0.1:' ~ (etcd_client_port | string)) | to_json }}
      advertise-client-urls: {{ ('http://' ~ ansible_host ~ ':' ~ (etcd_client_port | string)) | to_json }}
      listen-peer-urls: {{ ('http://' ~ ansible_host ~ ':' ~ (etcd_peer_port | string)) | to_json }}
      initial-advertise-peer-urls: {{ ('http://' ~ ansible_host ~ ':' ~ (etcd_peer_port | string)) | to_json }}
      initial-cluster: "{% for host_name in groups['all'] %}{{ 'etcd' ~ ((groups['all'] | list).index(host_name) + 1) }}=http://{{ hostvars[host_name].ansible_host }}:{{ etcd_peer_port }}{% if not loop.last %},{% endif %}{% endfor %}"
      initial-cluster-token: {{ etcd_cluster_token | to_json }}
      initial-cluster-state: new
      enable-v2: true
  tags: ["base_config"]

- name: Install etcd systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/etcd.service
    mode: "0644"
    content: |
      [Unit]
      Description=etcd key-value store
      Documentation=https://etcd.io/docs/
      After=network-online.target
      Wants=network-online.target

      [Service]
      Type=simple
      ExecStart={{ erawan_etcd_bin_path }} --config-file={{ etcd_config_path }}
      Restart=on-failure
      RestartSec=5
      LimitNOFILE=65536

      [Install]
      WantedBy=multi-user.target
  register: etcd_unit
  tags: ["base_config"]

- name: Install Patroni systemd unit
  ansible.builtin.copy:
    dest: /etc/systemd/system/patroni.service
    owner: root
    group: root
    mode: "0644"
    content: |
      [Unit]
      Description=Patroni PostgreSQL high availability
      After=network-online.target etcd.service
      Wants=network-online.target etcd.service

      [Service]
      Type=simple
      User=postgres
      Group=postgres
      Environment=PATH=/usr/local/bin:/usr/bin:/bin
      ExecStart={{ erawan_patroni_bin_path }} {{ patroni_config_path }}
      ExecReload=/bin/kill -s HUP $MAINPID
      KillMode=process
      TimeoutSec=30
      Restart=on-failure
      RestartSec=5
      LimitNOFILE=262144

      [Install]
      WantedBy=multi-user.target
  register: patroni_unit
  tags: ["base_config"]

- name: Reload systemd units
  ansible.builtin.systemd:
    daemon_reload: true
  when: etcd_unit.changed or patroni_unit.changed
  tags: ["base_config"]

- name: Ensure core services are enabled
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
  loop:
    - etcd
    - patroni
  tags: ["base_config"]
