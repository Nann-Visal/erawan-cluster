---
- name: Rollback mysqlrouter services
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Stop mysqlrouter service if present
      ansible.builtin.systemd:
        name: "{{ router_service_name }}"
        state: stopped
      ignore_errors: true
      tags: ["rollback"]

    - name: Disable mysqlrouter service if present
      ansible.builtin.systemd:
        name: "{{ router_service_name }}"
        enabled: false
      ignore_errors: true
      tags: ["rollback"]

    - name: Remove mysqlrouter systemd service file
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ router_service_name }}.service"
        state: absent
      tags: ["rollback"]

    - name: Remove mysqlrouter directory
      ansible.builtin.file:
        path: "/etc/mysqlrouter/{{ cluster_name }}"
        state: absent
      tags: ["rollback"]

- name: Dissolve cluster from primary
  hosts: mysql_primary
  gather_facts: false
  become: true
  tasks:
    - name: Dissolve InnoDB cluster if exists
      ansible.builtin.shell: |
        set -euo pipefail
        cat >/tmp/rollback_cluster.py <<'PY'
        primary_host = {{ primary_ip | to_json }}
        primary_port = {{ mysql_port }}
        cluster_name = {{ cluster_name | to_json }}
        cluster_admin_username = {{ cluster_admin_username | to_json }}
        cluster_admin_password = {{ cluster_admin_password | to_json }}
        root_password = {{ root_password | default("", true) | to_json }}

        connected = False
        try:
          shell.connect({
            "user": cluster_admin_username,
            "host": primary_host,
            "port": primary_port,
            "password": cluster_admin_password
          })
          connected = True
        except Exception:
          if root_password:
            shell.connect({
              "user": "root",
              "host": primary_host,
              "port": primary_port,
              "password": root_password
            })
            connected = True
          else:
            raise

        if not connected:
          raise RuntimeError("unable to connect to primary for cluster dissolve")

        try:
          cluster = dba.get_cluster(cluster_name)
          cluster.dissolve({"force": True})
          print("cluster dissolved")
        except Exception as e:
          message = str(e).lower()
          if "does not exist" in message or "unknown cluster" in message or "standalone instance" in message:
            print("cluster already absent")
          else:
            raise
        PY
        mysqlsh --py --file /tmp/rollback_cluster.py
        rm -f /tmp/rollback_cluster.py
      args:
        executable: /bin/bash
      register: rollback_cluster
      changed_when: "'cluster dissolved' in rollback_cluster.stdout"
      tags: ["rollback"]
