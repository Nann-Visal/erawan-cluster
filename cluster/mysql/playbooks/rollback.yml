---
- name: Rollback mysqlrouter services
  hosts: all
  gather_facts: false
  become: true
  tasks:
    - name: Stop mysqlrouter service if present
      ansible.builtin.systemd:
        name: "{{ router_service_name }}"
        state: stopped
      ignore_errors: true
      tags: ["rollback"]

    - name: Disable mysqlrouter service if present
      ansible.builtin.systemd:
        name: "{{ router_service_name }}"
        enabled: false
      ignore_errors: true
      tags: ["rollback"]

    - name: Remove mysqlrouter systemd service file
      ansible.builtin.file:
        path: "/etc/systemd/system/{{ router_service_name }}.service"
        state: absent
      tags: ["rollback"]

    - name: Remove mysqlrouter directory
      ansible.builtin.file:
        path: "/etc/mysqlrouter/{{ cluster_name }}"
        state: absent
      tags: ["rollback"]

- name: Dissolve cluster from primary
  hosts: mysql_primary
  gather_facts: false
  become: true
  tasks:
    - name: Dissolve InnoDB cluster if exists
      ansible.builtin.shell: |
        set -euo pipefail
        cat >/tmp/rollback_cluster.js <<'JS'
        shell.connect("{{ cluster_admin_username }}@{{ primary_ip }}:{{ mysql_port }}", "{{ cluster_admin_password }}");
        try {
          var cluster = dba.getCluster("{{ cluster_name }}");
          cluster.dissolve({force: true});
          print("cluster dissolved");
        } catch (e) {
          var message = String(e).toLowerCase();
          if (message.indexOf("does not exist") >= 0 || message.indexOf("unknown cluster") >= 0) {
            print("cluster already absent");
          } else {
            throw e;
          }
        }
        JS
        mysqlsh --js --file /tmp/rollback_cluster.js
        rm -f /tmp/rollback_cluster.js
      args:
        executable: /bin/bash
      register: rollback_cluster
      changed_when: "'cluster dissolved' in rollback_cluster.stdout"
      tags: ["rollback"]
