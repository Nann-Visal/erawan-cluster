- name: Initialize application database and user
  ansible.builtin.shell: |
    set -euo pipefail
    cat >/tmp/init_app_db.py <<'PY'
    import os

    shell.options["useWizards"] = False
    last_error = None
    for socket_path in ("/var/run/mysqld/mysqld.sock", "/run/mysqld/mysqld.sock", "/var/lib/mysql/mysql.sock"):
      if not os.path.exists(socket_path):
        continue
      try:
        shell.connect({
          "user": "root",
          "scheme": "mysql",
          "host": "localhost",
          "socket": socket_path
        })
        break
      except Exception as exc:
        last_error = exc
    else:
      if last_error is not None:
        raise last_error
      raise RuntimeError("unable to find a usable MySQL local socket for root")

    session = shell.get_session()
    db_name = {{ new_db | to_json }}
    app_user = {{ new_user | to_json }}
    app_pass = {{ new_user_password | to_json }}
    ssl_required = {{ (new_user_ssl_required | default(false) | bool) | ternary('True', 'False') }}

    escaped_db = db_name.replace("`", "``")
    escaped_user = app_user.replace("`", "``")

    session.run_sql(f"CREATE DATABASE IF NOT EXISTS `{escaped_db}`")
    session.run_sql(
      f"CREATE USER IF NOT EXISTS `{escaped_user}`@'%' IDENTIFIED WITH mysql_native_password BY ?",
      [app_pass],
    )
    session.run_sql(
      f"ALTER USER `{escaped_user}`@'%' IDENTIFIED WITH mysql_native_password BY ?",
      [app_pass],
    )
    if ssl_required:
      session.run_sql(f"ALTER USER `{escaped_user}`@'%' REQUIRE SSL")
    else:
      session.run_sql(f"ALTER USER `{escaped_user}`@'%' REQUIRE NONE")
    session.run_sql(
      f"GRANT ALL PRIVILEGES ON *.* TO `{escaped_user}`@'%' WITH GRANT OPTION"
    )
    session.run_sql(f"GRANT ALL PRIVILEGES ON `{escaped_db}`.* TO `{escaped_user}`@'%'")
    session.run_sql("FLUSH PRIVILEGES")
    print("application database and user initialized")
    PY
    timeout {{ mysqlsh_init_app_db_timeout_seconds | default(180) | int }} \
      mysqlsh --no-wizard --py --file /tmp/init_app_db.py
    rm -f /tmp/init_app_db.py
  args:
    executable: /bin/bash
  changed_when: false
  when:
    - (new_user | default('') | string | length) > 0
    - (new_db | default('') | string | length) > 0
  tags: ["init_app_db"]
